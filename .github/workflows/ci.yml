name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      percy_snapshots:
        description: Upload Percy snapshots
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests
        run: npm run test:e2e

      - name: A11y tests
        run: npm run test:a11y

      - name: Percy
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: |
          if [ "${{ inputs.percy_snapshots }}" = "true" ] && [ -n "$PERCY_TOKEN" ]; then
            echo "Running Percy with snapshot upload"
            npm run test:percy
          else
            echo "Running Percy in dry-run mode (use workflow_dispatch with percy_snapshots=true to enable uploads)"
            npm run test:percy:dry
          fi
