name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      percy_snapshots:
        description: Upload Percy snapshots
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 1
          include-hidden-files: true

  playwright:
    needs: [checks, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: A11y tests
        env:
          PLAYWRIGHT_WEB_SERVER: '1'
          PLAYWRIGHT_WEB_SERVER_CMD: 'npm run start -- --hostname 127.0.0.1 --port 4173'
        run: npx playwright test --project=a11y

      - name: E2E with Percy
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          PLAYWRIGHT_WEB_SERVER: '1'
          PLAYWRIGHT_WEB_SERVER_CMD: 'npm run start -- --hostname 127.0.0.1 --port 4173'
        run: |
          if [ "${{ inputs.percy_snapshots }}" = "true" ] && [ -n "$PERCY_TOKEN" ]; then
            echo "Running Percy with snapshot upload"
            npx percy exec -- npx playwright test --project=e2e
          else
            echo "Running Percy in dry-run mode (use workflow_dispatch with percy_snapshots=true to enable uploads)"
            npx percy exec --dry-run -- npx playwright test --project=e2e
          fi
